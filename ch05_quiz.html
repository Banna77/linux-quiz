<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linux Quiz - CH05: Configuring Firewall</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 36px;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 16px;
            opacity: 0.9;
        }

        .quiz-wrapper {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 10px;
            margin-bottom: 30px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            border-radius: 10px;
            transition: width 0.3s ease;
        }

        .question-counter {
            text-align: center;
            color: #666;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .question-container {
            margin-bottom: 30px;
        }

        .question-text {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            margin-bottom: 20px;
            line-height: 1.6;
        }

        .question-type {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option {
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: white;
        }

        .option:hover {
            border-color: #667eea;
            background: #f9f9ff;
        }

        .option input[type="radio"],
        .option input[type="checkbox"] {
            margin-right: 10px;
            cursor: pointer;
        }

        .option.selected {
            border-color: #667eea;
            background: #f0f4ff;
        }

        .option.correct {
            border-color: #10b981;
            background: #ecfdf5;
        }

        .option.incorrect {
            border-color: #ef4444;
            background: #fef2f2;
        }

        .option-text {
            display: inline;
            font-size: 15px;
            color: #333;
        }

        .feedback {
            margin-top: 15px;
            padding: 15px;
            border-radius: 10px;
            font-size: 14px;
            display: none;
        }

        .feedback.show {
            display: block;
        }

        .feedback.correct {
            background: #ecfdf5;
            color: #065f46;
            border-left: 4px solid #10b981;
        }

        .feedback.incorrect {
            background: #fef2f2;
            color: #7f1d1d;
            border-left: 4px solid #ef4444;
        }

        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 30px;
            justify-content: space-between;
        }

        button {
            padding: 12px 30px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-prev {
            background: #e0e0e0;
            color: #333;
        }

        .btn-prev:hover:not(:disabled) {
            background: #d0d0d0;
        }

        .btn-next {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            flex: 1;
        }

        .btn-next:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .results-container {
            display: none;
            text-align: center;
        }

        .results-container.show {
            display: block;
        }

        .score-display {
            font-size: 48px;
            font-weight: 700;
            color: #667eea;
            margin: 30px 0;
        }

        .score-message {
            font-size: 20px;
            color: #333;
            margin-bottom: 30px;
        }

        .results-summary {
            background: #f9f9f9;
            border-radius: 10px;
            padding: 20px;
            margin: 20px 0;
            text-align: left;
        }

        .summary-item {
            padding: 10px 0;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            justify-content: space-between;
        }

        .summary-item:last-child {
            border-bottom: none;
        }

        .btn-restart {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 40px;
            font-size: 16px;
            margin-top: 20px;
        }

        .btn-restart:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-home {
            background: #e0e0e0;
            color: #333;
            padding: 15px 40px;
            font-size: 16px;
            margin-top: 20px;
            margin-left: 10px;
        }

        .btn-home:hover {
            background: #d0d0d0;
        }

        @media (max-width: 600px) {
            .quiz-wrapper {
                padding: 20px;
            }

            .header h1 {
                font-size: 24px;
            }

            .question-text {
                font-size: 16px;
            }

            .button-group {
                flex-direction: column;
            }

            .btn-prev {
                order: 2;
            }

            .btn-next {
                order: 1;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📚 Linux Quiz</h1>
            <p>CH05: Configuring Firewall</p>
        </div>

        <div class="quiz-wrapper">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>

            <div class="question-counter" id="questionCounter"></div>

            <div id="quizContainer">
                <div class="question-container">
                    <div class="question-type" id="questionType"></div>
                    <div class="question-text" id="questionText"></div>
                    <div class="options" id="optionsContainer"></div>
                    <div class="feedback" id="feedback"></div>
                </div>

                <div class="button-group">
                    <button class="btn-prev" id="prevBtn" onclick="previousQuestion()">← Previous</button>
                    <button class="btn-next" id="nextBtn" onclick="nextQuestion()">Next →</button>
                </div>
            </div>

            <div class="results-container" id="resultsContainer">
                <h2>Quiz Completed! 🎉</h2>
                <div class="score-display" id="scoreDisplay"></div>
                <div class="score-message" id="scoreMessage"></div>
                <div class="results-summary" id="resultsSummary"></div>
                <button class="btn-restart" onclick="restartQuiz()">Retake Quiz</button>
                <button class="btn-home" onclick="window.location.href='index.html'">Back to Home</button>
            </div>
        </div>
    </div>

    <script>
        const quizData = [
            // Multiple Choice Questions (30)
            {
                type: "multiple",
                question: "What is the primary purpose of a firewall?",
                options: [
                    "To manage user accounts",
                    "To control network traffic and protect systems",
                    "To backup files",
                    "To manage disk space"
                ],
                correct: 1
            },
            {
                type: "multiple",
                question: "Which tool is the modern firewall management solution for Linux?",
                options: ["iptables", "netfilter", "firewalld", "ipchains"],
                correct: 2
            },
            {
                type: "multiple",
                question: "What does firewalld use to organize and manage firewall rules?",
                options: ["Tables", "Zones", "Chains", "Rules"],
                correct: 1
            },
            {
                type: "multiple",
                question: "Which zone is used for home networks where most computers are trusted?",
                options: ["Public", "Home", "Trusted", "Internal"],
                correct: 1
            },
            {
                type: "multiple",
                question: "What is the default zone in firewalld for newly created network interfaces?",
                options: ["Home", "Internal", "Public", "Trusted"],
                correct: 2
            },
            {
                type: "multiple",
                question: "Which zone blocks all incoming traffic and drops packets?",
                options: ["Block", "Drop", "Reject", "Deny"],
                correct: 1
            },
            {
                type: "multiple",
                question: "What is the DMZ zone primarily used for?",
                options: [
                    "Internal networks only",
                    "Demilitarized zone for exposed services",
                    "Backup storage",
                    "User authentication"
                ],
                correct: 1
            },
            {
                type: "multiple",
                question: "Where are system-defined firewalld rules stored?",
                options: [
                    "/etc/firewalld",
                    "/usr/lib/firewalld",
                    "/var/firewalld",
                    "/opt/firewalld"
                ],
                correct: 1
            },
            {
                type: "multiple",
                question: "Where are user-defined firewalld rules stored?",
                options: [
                    "/usr/lib/firewalld",
                    "/etc/firewalld",
                    "/var/firewalld",
                    "/home/firewalld"
                ],
                correct: 1
            },
            {
                type: "multiple",
                question: "What command checks the current firewall status?",
                options: [
                    "firewall-cmd --list-all",
                    "firewall-cmd --state",
                    "firewall-cmd --status",
                    "firewall-cmd --check"
                ],
                correct: 1
            },
            {
                type: "multiple",
                question: "How do you list all available firewalld zones?",
                options: [
                    "firewall-cmd --list-zones",
                    "firewall-cmd --get-zones",
                    "firewall-cmd --show-zones",
                    "firewall-cmd --zones"
                ],
                correct: 0
            },
            {
                type: "multiple",
                question: "What command sets a new default zone?",
                options: [
                    "firewall-cmd --default-zone=zone",
                    "firewall-cmd --set-default-zone=zone",
                    "firewall-cmd --change-zone=zone",
                    "firewall-cmd --zone-default=zone"
                ],
                correct: 1
            },
            {
                type: "multiple",
                question: "How do you add a service to a specific zone?",
                options: [
                    "firewall-cmd --add-service=service",
                    "firewall-cmd --zone=zone --add-service=service",
                    "firewall-cmd --service=service --add-zone=zone",
                    "firewall-cmd --enable-service=service"
                ],
                correct: 1
            },
            {
                type: "multiple",
                question: "What is the difference between a firewalld service and a systemd service?",
                options: [
                    "They are the same thing",
                    "Firewalld services define ports/protocols, systemd services are system processes",
                    "Systemd services are older",
                    "Firewalld services are only for networking"
                ],
                correct: 1
            },
            {
                type: "multiple",
                question: "How do you add a specific port to firewalld?",
                options: [
                    "firewall-cmd --add-port=port",
                    "firewall-cmd --zone=zone --add-port=port/protocol",
                    "firewall-cmd --enable-port=port",
                    "firewall-cmd --open-port=port"
                ],
                correct: 1
            },
            {
                type: "multiple",
                question: "What does the --permanent option do in firewall-cmd?",
                options: [
                    "Makes changes temporary",
                    "Saves changes permanently",
                    "Deletes all rules",
                    "Resets firewall to default"
                ],
                correct: 1
            },
            {
                type: "multiple",
                question: "How do you reload firewall configuration after making permanent changes?",
                options: [
                    "firewall-cmd --restart",
                    "firewall-cmd --reload",
                    "firewall-cmd --refresh",
                    "firewall-cmd --apply"
                ],
                correct: 1
            },
            {
                type: "multiple",
                question: "What are rich rules in firewalld?",
                options: [
                    "Simple port-based rules",
                    "Complex rules supporting conditions and actions",
                    "Rules for rich media",
                    "Rules for privileged users"
                ],
                correct: 1
            },
            {
                type: "multiple",
                question: "What format are firewalld rules stored in?",
                options: ["JSON", "YAML", "XML", "INI"],
                correct: 2
            },
            {
                type: "multiple",
                question: "How do you create a new firewalld service?",
                options: [
                    "firewall-cmd --new-service=servicename",
                    "firewall-cmd --create-service=servicename",
                    "firewall-cmd --add-service=servicename",
                    "firewall-cmd --define-service=servicename"
                ],
                correct: 0
            },
            {
                type: "multiple",
                question: "Which zone allows all network connections?",
                options: ["Public", "Home", "Trusted", "Internal"],
                correct: 2
            },
            {
                type: "multiple",
                question: "What command lists all active services in firewalld?",
                options: [
                    "firewall-cmd --list-services",
                    "firewall-cmd --get-services",
                    "firewall-cmd --show-services",
                    "firewall-cmd --services"
                ],
                correct: 0
            },
            {
                type: "multiple",
                question: "How do you add a rich rule to firewalld?",
                options: [
                    "firewall-cmd --add-rule=rule",
                    "firewall-cmd --add-rich-rule='rule'",
                    "firewall-cmd --rich-rule=rule",
                    "firewall-cmd --enable-rule=rule"
                ],
                correct: 1
            },
            {
                type: "multiple",
                question: "What is the purpose of the Block zone?",
                options: [
                    "Allows all traffic",
                    "Rejects incoming connections",
                    "Drops all traffic silently",
                    "Blocks specific services"
                ],
                correct: 1
            },
            {
                type: "multiple",
                question: "Which zone is used for external networks with masquerading?",
                options: ["Home", "External", "DMZ", "Trusted"],
                correct: 1
            },
            {
                type: "multiple",
                question: "How do you remove a service from a zone?",
                options: [
                    "firewall-cmd --zone=zone --remove-service=service",
                    "firewall-cmd --delete-service=service",
                    "firewall-cmd --disable-service=service",
                    "firewall-cmd --unallow-service=service"
                ],
                correct: 0
            },
            {
                type: "multiple",
                question: "What does firewalld analyze for incoming packets?",
                options: [
                    "Destination address",
                    "Source address to determine zone",
                    "Port number only",
                    "Protocol type only"
                ],
                correct: 1
            },
            {
                type: "multiple",
                question: "How do you save runtime rules permanently?",
                options: [
                    "firewall-cmd --save",
                    "firewall-cmd --runtime-to-permanent",
                    "firewall-cmd --permanent",
                    "firewall-cmd --persist"
                ],
                correct: 1
            },
            {
                type: "multiple",
                question: "Which command shows all rules for a specific zone?",
                options: [
                    "firewall-cmd --list-all",
                    "firewall-cmd --zone=zone --list-all",
                    "firewall-cmd --show-zone=zone",
                    "firewall-cmd --zone-rules=zone"
                ],
                correct: 1
            },

            // True/False Questions (20)
            {
                type: "truefalse",
                question: "Firewalld is the modern replacement for iptables in Linux.",
                correct: true
            },
            {
                type: "truefalse",
                question: "The Public zone is the most restrictive zone in firewalld.",
                correct: false
            },
            {
                type: "truefalse",
                question: "Firewalld zones allow administrators to assign different rules to different network areas.",
                correct: true
            },
            {
                type: "truefalse",
                question: "The Trusted zone blocks all incoming traffic.",
                correct: false
            },
            {
                type: "truefalse",
                question: "System-defined firewalld rules are stored in /etc/firewalld.",
                correct: false
            },
            {
                type: "truefalse",
                question: "A firewalld service is the same as a systemd service.",
                correct: false
            },
            {
                type: "truefalse",
                question: "Changes made with firewall-cmd are permanent by default.",
                correct: false
            },
            {
                type: "truefalse",
                question: "The --permanent option makes firewall-cmd changes permanent.",
                correct: true
            },
            {
                type: "truefalse",
                question: "Rich rules are more flexible than simple port-based rules.",
                correct: true
            },
            {
                type: "truefalse",
                question: "The Drop zone drops all incoming traffic silently.",
                correct: true
            },
            {
                type: "truefalse",
                question: "The Block zone sends rejection messages for incoming traffic.",
                correct: true
            },
            {
                type: "truefalse",
                question: "Firewalld rules are stored in binary format.",
                correct: false
            },
            {
                type: "truefalse",
                question: "You can create custom firewalld services.",
                correct: true
            },
            {
                type: "truefalse",
                question: "The firewall-cmd --reload command reloads the firewall configuration.",
                correct: true
            },
            {
                type: "truefalse",
                question: "Firewalld supports IPv6 rules.",
                correct: true
            },
            {
                type: "truefalse",
                question: "The Public zone is the default zone for new network interfaces.",
                correct: true
            },
            {
                type: "truefalse",
                question: "Firewalld zones can be assigned to specific network interfaces.",
                correct: true
            },
            {
                type: "truefalse",
                question: "The DMZ zone is used for internal networks only.",
                correct: false
            },
            {
                type: "truefalse",
                question: "Firewalld can manage both incoming and outgoing traffic.",
                correct: true
            },
            {
                type: "truefalse",
                question: "You must restart the system to apply firewalld changes.",
                correct: false
            }
        ];

        let currentQuestion = 0;
        let userAnswers = new Array(quizData.length).fill(null);
        let answered = new Array(quizData.length).fill(false);

        function initQuiz() {
            showQuestion(0);
        }

        function showQuestion(index) {
            const question = quizData[index];
            document.getElementById('questionCounter').textContent = `Question ${index + 1} of ${quizData.length}`;
            document.getElementById('questionType').textContent = question.type === 'multiple' ? 'Multiple Choice' : 'True / False';
            document.getElementById('questionText').textContent = question.question;

            const optionsContainer = document.getElementById('optionsContainer');
            optionsContainer.innerHTML = '';

            if (question.type === 'multiple') {
                question.options.forEach((option, optionIndex) => {
                    const div = document.createElement('div');
                    div.className = 'option';
                    if (userAnswers[index] === optionIndex) div.classList.add('selected');
                    if (answered[index]) {
                        if (optionIndex === question.correct) div.classList.add('correct');
                        else if (optionIndex === userAnswers[index]) div.classList.add('incorrect');
                    }
                    div.innerHTML = `<input type="radio" name="answer" value="${optionIndex}" ${userAnswers[index] === optionIndex ? 'checked' : ''} onchange="selectAnswer(${optionIndex})"> <span class="option-text">${option}</span>`;
                    optionsContainer.appendChild(div);
                });
            } else {
                ['True', 'False'].forEach((option, optionIndex) => {
                    const div = document.createElement('div');
                    div.className = 'option';
                    if (userAnswers[index] === optionIndex) div.classList.add('selected');
                    if (answered[index]) {
                        if (optionIndex === (question.correct ? 0 : 1)) div.classList.add('correct');
                        else if (optionIndex === userAnswers[index]) div.classList.add('incorrect');
                    }
                    div.innerHTML = `<input type="radio" name="answer" value="${optionIndex}" ${userAnswers[index] === optionIndex ? 'checked' : ''} onchange="selectAnswer(${optionIndex})"> <span class="option-text">${option}</span>`;
                    optionsContainer.appendChild(div);
                });
            }

            updateProgressBar();
            updateButtons();
            showFeedback();
        }

        function selectAnswer(index) {
            userAnswers[currentQuestion] = index;
            answered[currentQuestion] = true;
            showQuestion(currentQuestion);
        }

        function showFeedback() {
            const feedbackDiv = document.getElementById('feedback');
            if (!answered[currentQuestion]) {
                feedbackDiv.classList.remove('show');
                return;
            }

            const question = quizData[currentQuestion];
            const isCorrect = question.type === 'multiple' 
                ? userAnswers[currentQuestion] === question.correct
                : (userAnswers[currentQuestion] === 0) === question.correct;

            feedbackDiv.classList.add('show');
            feedbackDiv.className = `feedback show ${isCorrect ? 'correct' : 'incorrect'}`;
            feedbackDiv.textContent = isCorrect ? '✓ Correct!' : '✗ Incorrect!';
        }

        function nextQuestion() {
            if (currentQuestion < quizData.length - 1) {
                currentQuestion++;
                showQuestion(currentQuestion);
            } else {
                showResults();
            }
        }

        function previousQuestion() {
            if (currentQuestion > 0) {
                currentQuestion--;
                showQuestion(currentQuestion);
            }
        }

        function updateProgressBar() {
            const progress = ((currentQuestion + 1) / quizData.length) * 100;
            document.getElementById('progressFill').style.width = progress + '%';
        }

        function updateButtons() {
            document.getElementById('prevBtn').disabled = currentQuestion === 0;
            document.getElementById('nextBtn').textContent = currentQuestion === quizData.length - 1 ? 'Finish' : 'Next →';
        }

        function showResults() {
            const correctCount = userAnswers.filter((answer, index) => {
                const question = quizData[index];
                if (question.type === 'multiple') return answer === question.correct;
                else return (answer === 0) === question.correct;
            }).length;

            const percentage = Math.round((correctCount / quizData.length) * 100);

            document.getElementById('quizContainer').style.display = 'none';
            document.getElementById('resultsContainer').classList.add('show');
            document.getElementById('scoreDisplay').textContent = `${correctCount}/${quizData.length}`;
            document.getElementById('scoreMessage').textContent = `You scored ${percentage}%`;

            let summary = '';
            userAnswers.forEach((answer, index) => {
                const question = quizData[index];
                const isCorrect = question.type === 'multiple' 
                    ? answer === question.correct
                    : (answer === 0) === question.correct;
                summary += `<div class="summary-item"><span>Q${index + 1}: ${isCorrect ? '✓' : '✗'}</span></div>`;
            });
            document.getElementById('resultsSummary').innerHTML = summary;
        }

        function restartQuiz() {
            currentQuestion = 0;
            userAnswers = new Array(quizData.length).fill(null);
            answered = new Array(quizData.length).fill(false);
            document.getElementById('quizContainer').style.display = 'block';
            document.getElementById('resultsContainer').classList.remove('show');
            showQuestion(0);
        }

        window.onload = initQuiz;
    </script>
</body>
</html>
