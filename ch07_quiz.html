<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CH07: Network File Sharing Services Quiz</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            width: 100%;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .progress-container {
            background: #f0f0f0;
            padding: 20px;
            border-bottom: 1px solid #e0e0e0;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 10px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            transition: width 0.3s ease;
        }

        .progress-text {
            text-align: center;
            font-size: 14px;
            color: #666;
            font-weight: 600;
        }

        .content {
            padding: 40px;
            min-height: 400px;
        }

        .question-number {
            color: #667eea;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .question-text {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            margin-bottom: 25px;
            line-height: 1.5;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option {
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: white;
        }

        .option:hover {
            border-color: #667eea;
            background: #f9f9ff;
        }

        .option input[type="radio"],
        .option input[type="checkbox"] {
            margin-right: 10px;
            cursor: pointer;
        }

        .option.correct {
            background: #d4edda;
            border-color: #28a745;
            color: #155724;
        }

        .option.incorrect {
            background: #f8d7da;
            border-color: #dc3545;
            color: #721c24;
        }

        .option.selected {
            border-color: #667eea;
            background: #f0f4ff;
        }

        .feedback {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            font-size: 14px;
            display: none;
        }

        .feedback.show {
            display: block;
        }

        .feedback.correct {
            background: #d4edda;
            border: 1px solid #28a745;
            color: #155724;
        }

        .feedback.incorrect {
            background: #f8d7da;
            border: 1px solid #dc3545;
            color: #721c24;
        }

        .buttons {
            display: flex;
            gap: 10px;
            margin-top: 30px;
            justify-content: space-between;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-previous {
            background: #6c757d;
            color: white;
        }

        .btn-previous:hover {
            background: #5a6268;
        }

        .btn-previous:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .btn-next {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            flex-grow: 1;
        }

        .btn-next:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-next:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .results {
            text-align: center;
            padding: 40px;
        }

        .results h2 {
            color: #333;
            font-size: 28px;
            margin-bottom: 20px;
        }

        .score {
            font-size: 48px;
            font-weight: 700;
            color: #667eea;
            margin-bottom: 10px;
        }

        .percentage {
            font-size: 24px;
            color: #666;
            margin-bottom: 30px;
        }

        .results-summary {
            background: #f9f9f9;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 30px;
            text-align: left;
        }

        .summary-item {
            padding: 10px 0;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            justify-content: space-between;
        }

        .summary-item:last-child {
            border-bottom: none;
        }

        .btn-restart {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 40px;
            font-size: 16px;
        }

        .btn-restart:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .question-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(40px, 1fr));
            gap: 8px;
            margin-top: 20px;
        }

        .question-btn {
            width: 40px;
            height: 40px;
            padding: 0;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            background: white;
            transition: all 0.2s ease;
        }

        .question-btn:hover {
            border-color: #667eea;
        }

        .question-btn.answered {
            background: #28a745;
            color: white;
            border-color: #28a745;
        }

        .question-btn.current {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        @media (max-width: 600px) {
            .content {
                padding: 20px;
            }

            .header h1 {
                font-size: 22px;
            }

            .question-text {
                font-size: 16px;
            }

            .buttons {
                flex-direction: column;
            }

            .btn-next {
                flex-grow: 1;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌐 CH07: Network File Sharing Services</h1>
            <p>Test your knowledge about NFS, Samba, FTP, SCP, and Rsync</p>
        </div>

        <div class="progress-container">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="progress-text" id="progressText">Question 1 of 50</div>
        </div>

        <div class="content" id="quizContent">
            <!-- Quiz will be generated here -->
        </div>

        <div id="resultsContainer" style="display: none;">
            <div class="results">
                <h2>Quiz Completed! 🎉</h2>
                <div class="score" id="finalScore">0/50</div>
                <div class="percentage" id="finalPercentage">0%</div>
                <div class="results-summary" id="resultsSummary"></div>
                <button class="btn-restart" onclick="location.reload()">Retake Quiz</button>
            </div>
        </div>
    </div>

    <script>
        const quizData = [
            // Multiple Choice Questions (1-30)
            {
                type: "multiple",
                question: "What does NFS stand for?",
                options: ["Network File System", "Network File Service", "Network File Sharing", "Network File Storage"],
                correct: 0
            },
            {
                type: "multiple",
                question: "On RHEL 7, which version of NFS is the default?",
                options: ["NFS v2", "NFS v3", "NFS v4", "NFS v5"],
                correct: 2
            },
            {
                type: "multiple",
                question: "What is the main advantage of NFS pseudo root mounts?",
                options: ["Faster performance", "No need to mount every individual share separately", "Better security", "Reduced network traffic"],
                correct: 1
            },
            {
                type: "multiple",
                question: "Which file is used to define NFS exports on the server?",
                options: ["/etc/nfs.conf", "/etc/exports", "/etc/nfs/exports", "/etc/fstab"],
                correct: 1
            },
            {
                type: "multiple",
                question: "What TCP port is used for NFS in NFSv4?",
                options: ["111", "2049", "20", "21"],
                correct: 1
            },
            {
                type: "multiple",
                question: "What is the purpose of Kerberos security in NFSv4?",
                options: ["Increase network speed", "Provide encryption and user verification", "Reduce storage space", "Simplify configuration"],
                correct: 1
            },
            {
                type: "multiple",
                question: "Which command is used to test NFS client access?",
                options: ["nfstest", "showmount", "nfscheck", "mounttest"],
                correct: 1
            },
            {
                type: "multiple",
                question: "What is automount used for in NFS?",
                options: ["Automatically start NFS server", "Mount shares on demand without root permissions", "Automatically backup NFS shares", "Automatically update NFS exports"],
                correct: 1
            },
            {
                type: "multiple",
                question: "What is the difference between indirect and direct automount maps?",
                options: ["Indirect is faster", "Indirect creates directories on demand, direct requires pre-existing directories", "Direct is more secure", "There is no difference"],
                correct: 1
            },
            {
                type: "multiple",
                question: "Which package is used for automount configuration on RHEL 7?",
                options: ["nfs-utils", "autofs", "automount", "nfs-automount"],
                correct: 1
            },
            {
                type: "multiple",
                question: "What does Samba provide?",
                options: ["NFS file sharing", "SMB/CIFS file sharing for Windows compatibility", "FTP services", "SSH tunneling"],
                correct: 1
            },
            {
                type: "multiple",
                question: "Which file is used to configure Samba shares?",
                options: ["/etc/samba/samba.conf", "/etc/samba/smb.conf", "/etc/smb.conf", "/etc/samba.conf"],
                correct: 1
            },
            {
                type: "multiple",
                question: "What command is used to create a Samba user?",
                options: ["smbuser", "smbpasswd", "useradd", "samba-user"],
                correct: 1
            },
            {
                type: "multiple",
                question: "Which protocol does FTP use for data transfer?",
                options: ["TCP", "UDP", "ICMP", "IGMP"],
                correct: 0
            },
            {
                type: "multiple",
                question: "What is the default FTP server software on RHEL?",
                options: ["ProFTPD", "vsftpd", "Pure-FTPd", "Bftpd"],
                correct: 1
            },
            {
                type: "multiple",
                question: "Which configuration file is used for vsftpd?",
                options: ["/etc/ftp.conf", "/etc/vsftpd.conf", "/etc/ftp/vsftpd.conf", "/etc/vsftpd/config"],
                correct: 1
            },
            {
                type: "multiple",
                question: "What is the default FTP port?",
                options: ["20", "21", "22", "23"],
                correct: 1
            },
            {
                type: "multiple",
                question: "What command is used for secure file transfer using SSH?",
                options: ["ftp", "sftp", "scp", "rsync"],
                correct: 2
            },
            {
                type: "multiple",
                question: "What is the main advantage of SCP over FTP?",
                options: ["Faster speed", "Uses SSH for encryption and security", "Supports more file types", "Works with Windows"],
                correct: 1
            },
            {
                type: "multiple",
                question: "What is rsync primarily used for?",
                options: ["File transfer", "Synchronizing files and directories", "Backup only", "Network monitoring"],
                correct: 1
            },
            {
                type: "multiple",
                question: "Which option in rsync is used for recursive copying?",
                options: ["-r", "-R", "-a", "-v"],
                correct: 0
            },
            {
                type: "multiple",
                question: "What does the -a option in rsync do?",
                options: ["Archive mode (recursive, preserves permissions)", "Append mode", "All files", "Automatic"],
                correct: 0
            },
            {
                type: "multiple",
                question: "What is the syntax for SCP to copy a file from remote to local?",
                options: ["scp local user@host:file", "scp user@host:file local", "scp file user@host", "scp host:file local"],
                correct: 1
            },
            {
                type: "multiple",
                question: "Which of the following is NOT a feature of NFS?",
                options: ["Pseudo root mounts", "Kerberos security", "Simplified firewalling", "Windows file sharing"],
                correct: 3
            },
            {
                type: "multiple",
                question: "What is the purpose of /etc/auto.master in automount?",
                options: ["Define NFS exports", "Reference master automount maps", "Configure NFS server", "Set NFS permissions"],
                correct: 1
            },
            {
                type: "multiple",
                question: "Which command is used to reload NFS exports?",
                options: ["nfs reload", "exportfs -r", "systemctl reload nfs", "nfsctl reload"],
                correct: 1
            },
            {
                type: "multiple",
                question: "What is a Samba share?",
                options: ["An NFS export", "A directory shared via SMB/CIFS protocol", "An FTP directory", "A mounted network drive"],
                correct: 1
            },
            {
                type: "multiple",
                question: "Which option in rsync is used for verbose output?",
                options: ["-v", "-verbose", "-V", "-output"],
                correct: 0
            },
            {
                type: "multiple",
                question: "What is the primary difference between FTP and SFTP?",
                options: ["Speed", "SFTP uses SSH encryption", "FTP is faster", "SFTP is only for Linux"],
                correct: 1
            },
            {
                type: "multiple",
                question: "Which command mounts an NFS share?",
                options: ["nfsmount", "mount -t nfs", "nfs mount", "mount nfs"],
                correct: 1
            },

            // True/False Questions (31-50)
            {
                type: "truefalse",
                question: "NFS v4 provides backward compatibility with earlier NFS versions.",
                correct: true
            },
            {
                type: "truefalse",
                question: "Pseudo root mounts require mounting each NFS share individually.",
                correct: false
            },
            {
                type: "truefalse",
                question: "Kerberos security in NFS only provides encryption.",
                correct: false
            },
            {
                type: "truefalse",
                question: "TCP port 2049 is used for all NFS processes in NFSv4.",
                correct: true
            },
            {
                type: "truefalse",
                question: "Automount requires root permissions to mount NFS shares.",
                correct: false
            },
            {
                type: "truefalse",
                question: "Indirect automount maps create directories on demand.",
                correct: true
            },
            {
                type: "truefalse",
                question: "Direct automount maps require pre-existing directories.",
                correct: true
            },
            {
                type: "truefalse",
                question: "Samba provides Windows file sharing compatibility on Linux.",
                correct: true
            },
            {
                type: "truefalse",
                question: "FTP transmits passwords in plaintext.",
                correct: true
            },
            {
                type: "truefalse",
                question: "vsftpd is the default FTP server on RHEL.",
                correct: true
            },
            {
                type: "truefalse",
                question: "SCP is more secure than FTP because it uses SSH.",
                correct: true
            },
            {
                type: "truefalse",
                question: "rsync can only copy files, not synchronize them.",
                correct: false
            },
            {
                type: "truefalse",
                question: "The -a option in rsync enables archive mode.",
                correct: true
            },
            {
                type: "truefalse",
                question: "NFS exports are defined in the /etc/fstab file.",
                correct: false
            },
            {
                type: "truefalse",
                question: "Samba users are the same as Linux system users.",
                correct: false
            },
            {
                type: "truefalse",
                question: "FTP uses port 21 for control and port 20 for data.",
                correct: true
            },
            {
                type: "truefalse",
                question: "rsync can work over SSH for secure transfers.",
                correct: true
            },
            {
                type: "truefalse",
                question: "NFS is suitable for sharing files between Windows and Linux.",
                correct: false
            },
            {
                type: "truefalse",
                question: "The exportfs command is used to manage NFS exports.",
                correct: true
            },
            {
                type: "truefalse",
                question: "Automount mounts shares by default when the system starts.",
                correct: false
            }
        ];

        let currentQuestion = 0;
        let answers = new Array(quizData.length).fill(null);
        let answered = new Set();

        function initQuiz() {
            showQuestion();
        }

        function showQuestion() {
            const question = quizData[currentQuestion];
            const content = document.getElementById('quizContent');
            let html = `
                <div class="question-number">Question ${currentQuestion + 1} of ${quizData.length}</div>
                <div class="question-text">${question.question}</div>
                <div class="options" id="optionsContainer">
            `;

            if (question.type === "multiple") {
                question.options.forEach((option, index) => {
                    const isSelected = answers[currentQuestion] === index;
                    const selectedClass = isSelected ? 'selected' : '';
                    html += `
                        <label class="option ${selectedClass}">
                            <input type="radio" name="answer" value="${index}" ${isSelected ? 'checked' : ''} 
                                   onchange="selectAnswer(${index})">
                            ${option}
                        </label>
                    `;
                });
            } else {
                const isTrue = answers[currentQuestion] === true;
                const isFalse = answers[currentQuestion] === false;
                html += `
                    <label class="option ${isTrue ? 'selected' : ''}">
                        <input type="radio" name="answer" value="true" ${isTrue ? 'checked' : ''} 
                               onchange="selectAnswer(true)">
                        True
                    </label>
                    <label class="option ${isFalse ? 'selected' : ''}">
                        <input type="radio" name="answer" value="false" ${isFalse ? 'checked' : ''} 
                               onchange="selectAnswer(false)">
                        False
                    </label>
                `;
            }

            html += `</div>`;
            html += `<div class="feedback" id="feedback"></div>`;
            html += `
                <div class="buttons">
                    <button class="btn-previous" onclick="previousQuestion()" ${currentQuestion === 0 ? 'disabled' : ''}>← Previous</button>
                    <button class="btn-next" onclick="nextQuestion()" ${answers[currentQuestion] === null ? 'disabled' : ''}>Next →</button>
                </div>
            `;

            content.innerHTML = html;
            updateProgress();
        }

        function selectAnswer(value) {
            answers[currentQuestion] = value;
            answered.add(currentQuestion);
            document.querySelector('.btn-next').disabled = false;
            showQuestion();
        }

        function nextQuestion() {
            if (currentQuestion < quizData.length - 1) {
                currentQuestion++;
                showQuestion();
            } else {
                showResults();
            }
        }

        function previousQuestion() {
            if (currentQuestion > 0) {
                currentQuestion--;
                showQuestion();
            }
        }

        function updateProgress() {
            const progress = ((currentQuestion + 1) / quizData.length) * 100;
            document.getElementById('progressFill').style.width = progress + '%';
            document.getElementById('progressText').textContent = `Question ${currentQuestion + 1} of ${quizData.length}`;
        }

        function showResults() {
            let correct = 0;
            const results = [];

            for (let i = 0; i < quizData.length; i++) {
                const question = quizData[i];
                let isCorrect = false;

                if (question.type === "multiple") {
                    isCorrect = answers[i] === question.correct;
                } else {
                    isCorrect = answers[i] === question.correct;
                }

                if (isCorrect) correct++;
                results.push({ question: question.question, correct: isCorrect });
            }

            const percentage = Math.round((correct / quizData.length) * 100);

            document.getElementById('quizContent').style.display = 'none';
            document.getElementById('resultsContainer').style.display = 'block';
            document.getElementById('finalScore').textContent = `${correct}/${quizData.length}`;
            document.getElementById('finalPercentage').textContent = `${percentage}%`;

            let summary = `
                <div class="summary-item">
                    <span>Correct Answers:</span>
                    <span style="color: #28a745; font-weight: bold;">${correct}</span>
                </div>
                <div class="summary-item">
                    <span>Incorrect Answers:</span>
                    <span style="color: #dc3545; font-weight: bold;">${quizData.length - correct}</span>
                </div>
                <div class="summary-item">
                    <span>Accuracy:</span>
                    <span style="color: #667eea; font-weight: bold;">${percentage}%</span>
                </div>
            `;

            document.getElementById('resultsSummary').innerHTML = summary;
        }

        // Initialize quiz on page load
        window.addEventListener('load', initQuiz);
    </script>
</body>
</html>
