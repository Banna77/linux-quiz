<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CH08: Remote Access Quiz</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            width: 100%;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .progress-container {
            background: #f0f0f0;
            padding: 20px;
            border-bottom: 1px solid #e0e0e0;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 10px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            transition: width 0.3s ease;
        }

        .progress-text {
            text-align: center;
            font-size: 14px;
            color: #666;
            font-weight: 600;
        }

        .content {
            padding: 40px;
            min-height: 400px;
        }

        .question-number {
            color: #667eea;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .question-text {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            margin-bottom: 25px;
            line-height: 1.5;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option {
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: white;
        }

        .option:hover {
            border-color: #667eea;
            background: #f9f9ff;
        }

        .option input[type="radio"],
        .option input[type="checkbox"] {
            margin-right: 10px;
            cursor: pointer;
        }

        .option.correct {
            background: #d4edda;
            border-color: #28a745;
            color: #155724;
        }

        .option.incorrect {
            background: #f8d7da;
            border-color: #dc3545;
            color: #721c24;
        }

        .option.selected {
            border-color: #667eea;
            background: #f0f4ff;
        }

        .feedback {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            font-size: 14px;
            display: none;
        }

        .feedback.show {
            display: block;
        }

        .feedback.correct {
            background: #d4edda;
            border: 1px solid #28a745;
            color: #155724;
        }

        .feedback.incorrect {
            background: #f8d7da;
            border: 1px solid #dc3545;
            color: #721c24;
        }

        .buttons {
            display: flex;
            gap: 10px;
            margin-top: 30px;
            justify-content: space-between;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-previous {
            background: #6c757d;
            color: white;
        }

        .btn-previous:hover {
            background: #5a6268;
        }

        .btn-previous:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .btn-next {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            flex-grow: 1;
        }

        .btn-next:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-next:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .results {
            text-align: center;
            padding: 40px;
        }

        .results h2 {
            color: #333;
            font-size: 28px;
            margin-bottom: 20px;
        }

        .score {
            font-size: 48px;
            font-weight: 700;
            color: #667eea;
            margin-bottom: 10px;
        }

        .percentage {
            font-size: 24px;
            color: #666;
            margin-bottom: 30px;
        }

        .results-summary {
            background: #f9f9f9;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 30px;
            text-align: left;
        }

        .summary-item {
            padding: 10px 0;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            justify-content: space-between;
        }

        .summary-item:last-child {
            border-bottom: none;
        }

        .btn-restart {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 40px;
            font-size: 16px;
        }

        .btn-restart:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        @media (max-width: 600px) {
            .content {
                padding: 20px;
            }

            .header h1 {
                font-size: 22px;
            }

            .question-text {
                font-size: 16px;
            }

            .buttons {
                flex-direction: column;
            }

            .btn-next {
                flex-grow: 1;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔐 CH08: Remote Access</h1>
            <p>Master SSH, key-based authentication, and secure remote access</p>
        </div>

        <div class="progress-container">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="progress-text" id="progressText">Question 1 of 50</div>
        </div>

        <div class="content" id="quizContent">
            <!-- Quiz will be generated here -->
        </div>

        <div id="resultsContainer" style="display: none;">
            <div class="results">
                <h2>Quiz Completed! 🎉</h2>
                <div class="score" id="finalScore">0/50</div>
                <div class="percentage" id="finalPercentage">0%</div>
                <div class="results-summary" id="resultsSummary"></div>
                <button class="btn-restart" onclick="location.reload()">Retake Quiz</button>
            </div>
        </div>
    </div>

    <script>
        const quizData = [
            // Multiple Choice Questions (1-30)
            {
                type: "multiple",
                question: "What does SSH stand for?",
                options: ["Secure Shell", "Secure Socket Host", "System Shell", "Secure Server Host"],
                correct: 0
            },
            {
                type: "multiple",
                question: "Which command is used to generate SSH key pairs?",
                options: ["ssh-generate", "ssh-keygen", "ssh-create", "ssh-new"],
                correct: 1
            },
            {
                type: "multiple",
                question: "What is the default SSH port?",
                options: ["20", "21", "22", "23"],
                correct: 2
            },
            {
                type: "multiple",
                question: "Which file contains the server's SSH configuration?",
                options: ["/etc/ssh/ssh_config", "/etc/ssh/sshd_config", "/etc/sshd.conf", "/etc/ssh.conf"],
                correct: 1
            },
            {
                type: "multiple",
                question: "Which file contains the client's SSH configuration?",
                options: ["/etc/ssh/ssh_config", "/etc/ssh/sshd_config", "/etc/ssh_client.conf", "/etc/client.conf"],
                correct: 0
            },
            {
                type: "multiple",
                question: "Where are SSH host keys stored?",
                options: ["/etc/ssh/", "/home/user/.ssh/", "/root/.ssh/", "/var/ssh/"],
                correct: 0
            },
            {
                type: "multiple",
                question: "What is the purpose of ssh-agent?",
                options: ["Manages SSH connections", "Holds private keys for authentication", "Encrypts SSH traffic", "Monitors SSH logs"],
                correct: 1
            },
            {
                type: "multiple",
                question: "Which command copies SSH public keys to a remote server?",
                options: ["ssh-copy", "ssh-copy-id", "ssh-transfer", "scp-key"],
                correct: 1
            },
            {
                type: "multiple",
                question: "What is SSH tunneling used for?",
                options: ["Backing up files", "Forwarding network connections through SSH", "Compressing data", "Monitoring bandwidth"],
                correct: 1
            },
            {
                type: "multiple",
                question: "Which OpenSSH package contains the SSH server daemon?",
                options: ["openssh", "openssh-clients", "openssh-server", "openssh-daemon"],
                correct: 2
            },
            {
                type: "multiple",
                question: "What does the -v option in SSH do?",
                options: ["Verify connection", "Verbose output", "Virtual connection", "Verify keys"],
                correct: 1
            },
            {
                type: "multiple",
                question: "Which command is used to securely copy files using SSH?",
                options: ["ssh-copy", "sftp", "scp", "ssh-transfer"],
                correct: 2
            },
            {
                type: "multiple",
                question: "What is a passphrase in SSH?",
                options: ["A password for the SSH server", "A password protecting the private key", "A phrase used in SSH tunneling", "A security token"],
                correct: 1
            },
            {
                type: "multiple",
                question: "Which file stores authorized SSH public keys on the server?",
                options: ["/etc/ssh/authorized_keys", "/home/user/.ssh/authorized_keys", "/root/.ssh/public_keys", "/etc/authorized_keys"],
                correct: 1
            },
            {
                type: "multiple",
                question: "What is the difference between RSA and DSA keys?",
                options: ["RSA is faster", "DSA is more secure", "RSA uses different key size and algorithm", "They are identical"],
                correct: 2
            },
            {
                type: "multiple",
                question: "Which command adds SSH keys to ssh-agent?",
                options: ["ssh-add", "ssh-agent-add", "agent-add", "ssh-load"],
                correct: 0
            },
            {
                type: "multiple",
                question: "What is the purpose of /var/log/secure?",
                options: ["Store SSH keys", "Capture SSH authentication messages", "Store SSH configuration", "Monitor SSH performance"],
                correct: 1
            },
            {
                type: "multiple",
                question: "Which option disables root login via SSH?",
                options: ["NoRoot", "PermitRootLogin no", "DisableRoot", "RootAccess no"],
                correct: 1
            },
            {
                type: "multiple",
                question: "What is the purpose of SSH key fingerprints?",
                options: ["Encrypt data", "Verify key authenticity", "Compress keys", "Monitor connections"],
                correct: 1
            },
            {
                type: "multiple",
                question: "Which encryption technique is used in SSH?",
                options: ["Symmetric encryption only", "Asymmetric encryption only", "Both symmetric and asymmetric encryption", "No encryption"],
                correct: 2
            },
            {
                type: "multiple",
                question: "What is the default location for user SSH keys?",
                options: ["/etc/ssh/", "/root/.ssh/", "/home/user/.ssh/", "/var/ssh/"],
                correct: 2
            },
            {
                type: "multiple",
                question: "Which command is used to connect to a remote SSH server?",
                options: ["sshconnect", "ssh", "remote-ssh", "ssh-connect"],
                correct: 1
            },
            {
                type: "multiple",
                question: "What is the purpose of HostKey in sshd_config?",
                options: ["Specify client keys", "Specify server host keys", "Specify user keys", "Specify backup keys"],
                correct: 1
            },
            {
                type: "multiple",
                question: "Which option in SSH allows X11 forwarding?",
                options: ["AllowX11", "X11Forwarding yes", "EnableX11", "ForwardX11"],
                correct: 1
            },
            {
                type: "multiple",
                question: "What is the purpose of ssh-copy-id?",
                options: ["Copy SSH server", "Copy SSH configuration", "Copy public key to authorized_keys on remote server", "Copy private keys"],
                correct: 2
            },
            {
                type: "multiple",
                question: "Which file contains SSH client configuration on a per-user basis?",
                options: ["/etc/ssh/ssh_config", "/home/user/.ssh/config", "/root/.ssh/ssh_config", "/etc/ssh/client.conf"],
                correct: 1
            },
            {
                type: "multiple",
                question: "What is the purpose of digital signatures in SSH?",
                options: ["Encrypt data", "Verify authenticity and integrity", "Compress data", "Monitor traffic"],
                correct: 1
            },
            {
                type: "multiple",
                question: "Which command lists SSH keys held by ssh-agent?",
                options: ["ssh-list", "ssh-agent -l", "ssh-add -l", "agent-list"],
                correct: 2
            },
            {
                type: "multiple",
                question: "What is the purpose of StrictHostKeyChecking in SSH?",
                options: ["Check password strength", "Verify host key authenticity", "Check SSH version", "Monitor connections"],
                correct: 1
            },
            {
                type: "multiple",
                question: "Which OpenSSH package includes the ssh command?",
                options: ["openssh", "openssh-server", "openssh-clients", "openssh-tools"],
                correct: 2
            },

            // True/False Questions (31-50)
            {
                type: "truefalse",
                question: "SSH transmits passwords in plaintext.",
                correct: false
            },
            {
                type: "truefalse",
                question: "The openssh-server package is installed by default on RHEL.",
                correct: true
            },
            {
                type: "truefalse",
                question: "SSH uses only symmetric encryption.",
                correct: false
            },
            {
                type: "truefalse",
                question: "The private key should be kept secret and never shared.",
                correct: true
            },
            {
                type: "truefalse",
                question: "SSH public keys can be safely shared with anyone.",
                correct: true
            },
            {
                type: "truefalse",
                question: "Key-based authentication is more secure than password authentication.",
                correct: true
            },
            {
                type: "truefalse",
                question: "SSH uses port 21 by default.",
                correct: false
            },
            {
                type: "truefalse",
                question: "The sshd_config file is located in /etc/ssh/.",
                correct: true
            },
            {
                type: "truefalse",
                question: "SSH tunneling allows forwarding of network connections through SSH.",
                correct: true
            },
            {
                type: "truefalse",
                question: "The authorized_keys file contains the server's private keys.",
                correct: false
            },
            {
                type: "truefalse",
                question: "ssh-agent stores private keys in memory for authentication.",
                correct: true
            },
            {
                type: "truefalse",
                question: "A passphrase is used to protect the private key file.",
                correct: true
            },
            {
                type: "truefalse",
                question: "SCP can only transfer files, not directories.",
                correct: false
            },
            {
                type: "truefalse",
                question: "SSH uses asymmetric encryption for key exchange.",
                correct: true
            },
            {
                type: "truefalse",
                question: "The .ssh directory should have 700 permissions.",
                correct: true
            },
            {
                type: "truefalse",
                question: "SSH can be used to replace telnet for remote access.",
                correct: true
            },
            {
                type: "truefalse",
                question: "Digital signatures in SSH verify the authenticity of data.",
                correct: true
            },
            {
                type: "truefalse",
                question: "X11 forwarding allows running graphical applications over SSH.",
                correct: true
            },
            {
                type: "truefalse",
                question: "The ssh_config file is used to configure the SSH server.",
                correct: false
            },
            {
                type: "truefalse",
                question: "SSH can be configured to use alternative ports for security.",
                correct: true
            }
        ];

        let currentQuestion = 0;
        let answers = new Array(quizData.length).fill(null);
        let answered = new Set();

        function initQuiz() {
            showQuestion();
        }

        function showQuestion() {
            const question = quizData[currentQuestion];
            const content = document.getElementById('quizContent');
            let html = `
                <div class="question-number">Question ${currentQuestion + 1} of ${quizData.length}</div>
                <div class="question-text">${question.question}</div>
                <div class="options" id="optionsContainer">
            `;

            if (question.type === "multiple") {
                question.options.forEach((option, index) => {
                    const isSelected = answers[currentQuestion] === index;
                    const selectedClass = isSelected ? 'selected' : '';
                    html += `
                        <label class="option ${selectedClass}">
                            <input type="radio" name="answer" value="${index}" ${isSelected ? 'checked' : ''} 
                                   onchange="selectAnswer(${index})">
                            ${option}
                        </label>
                    `;
                });
            } else {
                const isTrue = answers[currentQuestion] === true;
                const isFalse = answers[currentQuestion] === false;
                html += `
                    <label class="option ${isTrue ? 'selected' : ''}">
                        <input type="radio" name="answer" value="true" ${isTrue ? 'checked' : ''} 
                               onchange="selectAnswer(true)">
                        True
                    </label>
                    <label class="option ${isFalse ? 'selected' : ''}">
                        <input type="radio" name="answer" value="false" ${isFalse ? 'checked' : ''} 
                               onchange="selectAnswer(false)">
                        False
                    </label>
                `;
            }

            html += `</div>`;
            html += `<div class="feedback" id="feedback"></div>`;
            html += `
                <div class="buttons">
                    <button class="btn-previous" onclick="previousQuestion()" ${currentQuestion === 0 ? 'disabled' : ''}>← Previous</button>
                    <button class="btn-next" onclick="nextQuestion()" ${answers[currentQuestion] === null ? 'disabled' : ''}>Next →</button>
                </div>
            `;

            content.innerHTML = html;
            updateProgress();
        }

        function selectAnswer(value) {
            answers[currentQuestion] = value;
            answered.add(currentQuestion);
            document.querySelector('.btn-next').disabled = false;
            showQuestion();
        }

        function nextQuestion() {
            if (currentQuestion < quizData.length - 1) {
                currentQuestion++;
                showQuestion();
            } else {
                showResults();
            }
        }

        function previousQuestion() {
            if (currentQuestion > 0) {
                currentQuestion--;
                showQuestion();
            }
        }

        function updateProgress() {
            const progress = ((currentQuestion + 1) / quizData.length) * 100;
            document.getElementById('progressFill').style.width = progress + '%';
            document.getElementById('progressText').textContent = `Question ${currentQuestion + 1} of ${quizData.length}`;
        }

        function showResults() {
            let correct = 0;
            const results = [];

            for (let i = 0; i < quizData.length; i++) {
                const question = quizData[i];
                let isCorrect = false;

                if (question.type === "multiple") {
                    isCorrect = answers[i] === question.correct;
                } else {
                    isCorrect = answers[i] === question.correct;
                }

                if (isCorrect) correct++;
                results.push({ question: question.question, correct: isCorrect });
            }

            const percentage = Math.round((correct / quizData.length) * 100);

            document.getElementById('quizContent').style.display = 'none';
            document.getElementById('resultsContainer').style.display = 'block';
            document.getElementById('finalScore').textContent = `${correct}/${quizData.length}`;
            document.getElementById('finalPercentage').textContent = `${percentage}%`;

            let summary = `
                <div class="summary-item">
                    <span>Correct Answers:</span>
                    <span style="color: #28a745; font-weight: bold;">${correct}</span>
                </div>
                <div class="summary-item">
                    <span>Incorrect Answers:</span>
                    <span style="color: #dc3545; font-weight: bold;">${quizData.length - correct}</span>
                </div>
                <div class="summary-item">
                    <span>Accuracy:</span>
                    <span style="color: #667eea; font-weight: bold;">${percentage}%</span>
                </div>
            `;

            document.getElementById('resultsSummary').innerHTML = summary;
        }

        // Initialize quiz on page load
        window.addEventListener('load', initQuiz);
    </script>
</body>
</html>
